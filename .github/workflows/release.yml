name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Check formatting
        run: cargo fmt --check

      - name: Check workspace
        run: cargo check --workspace --locked

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Check Zed extension Wasm target
        run: cargo check -p zeddeps --target wasm32-wasip1 --locked

  build:
    name: Build ${{ matrix.asset }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: zeddeps-lsp-x86_64-unknown-linux-gnu
            binary: zeddeps-lsp
            builder: cargo
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: zeddeps-lsp-aarch64-unknown-linux-gnu
            binary: zeddeps-lsp
            builder: cross
          - os: macos-26-intel
            target: x86_64-apple-darwin
            asset: zeddeps-lsp-x86_64-apple-darwin
            binary: zeddeps-lsp
            builder: cargo
          - os: macos-26
            target: aarch64-apple-darwin
            asset: zeddeps-lsp-aarch64-apple-darwin
            binary: zeddeps-lsp
            builder: cargo
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: zeddeps-lsp-x86_64-pc-windows-msvc.exe
            binary: zeddeps-lsp.exe
            builder: cargo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.builder == 'cross'
        uses: taiki-e/install-action@cross

      - name: Build LSP
        if: matrix.builder == 'cargo'
        run: cargo build -p zeddeps-lsp --release --target ${{ matrix.target }} --locked

      - name: Build LSP with cross
        if: matrix.builder == 'cross'
        run: cross build -p zeddeps-lsp --release --target ${{ matrix.target }} --locked

      - name: Prepare asset
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.asset }}"
          chmod +x "${{ matrix.asset }}" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ZedDeps ${{ steps.release.outputs.tag }}
          files: dist/*
          fail_on_unmatched_files: true
